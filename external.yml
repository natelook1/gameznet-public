      entryPoints: ["websecure"]
      service: qdrant-svc
    remote-router:
      rule: "Host(`remote.looknet.ca`)"
      entryPoints: ["websecure"]
      service: remote-svc
      middlewares: ["guac-redirect"]
    code-router:
      rule: "Host(`code.looknet.ca`)"
      entryPoints: ["websecure"]
      service: code-svc
      middlewares: ["authentik-fwd@file"]
    auth-router:
      rule: "Host(`auth.looknet.ca`)"
      entryPoints: ["websecure"]
      service: auth-svc
      middlewares: ["authelia-headers-fix@file"]
    traefik-dashboard-router:
      rule: "Host(`traefik.looknet.ca`)"
      entryPoints: ["websecure"]
      service: traefik-svc
      middlewares: ["authentik-fwd@file"]
    receipt-router:
      rule: "Host(`receipt.looknet.ca`)"
      entryPoints: ["websecure"]
      service: receipt-svc
    ipmi-router:
      rule: "Host(`ipmi.looknet.ca`)"
      entryPoints: ["websecure"]
      service: ipmi-svc
      middlewares: ["authentik-fwd@file"]
    technitium-router:
      rule: "Host(`technitium.looknet.ca`)"
      entryPoints: ["websecure"]
      service: technitium-svc
    homarr-router:
      rule: "Host(`homarr.looknet.ca`)"
      entryPoints: ["websecure"]
      service: homarr-svc
    metrics-router:
      rule: "Host(`metrics.looknet.ca`)"
      entryPoints: ["websecure"]
      service: metrics-svc
    radarr-router:
      rule: "Host(`movies.looknet.ca`)"
      entryPoints: ["websecure"]
      service: radarr-svc
      middlewares: ["authentik-fwd@file"]
    sonarr-router:
      rule: "Host(`tv.looknet.ca`)"
      entryPoints: ["websecure"]
      service: sonarr-svc
      middlewares: ["authentik-fwd@file"]
    sabnzbd-router:
      rule: "Host(`sabnzbd.looknet.ca`)"
      entryPoints: ["websecure"]
      service: sabnzbd-svc
      middlewares: ["authentik-fwd@file"]
    torrent-router:
      rule: "Host(`torrent.looknet.ca`)"
      entryPoints: ["websecure"]
      service: torrent-svc
      middlewares: ["authentik-fwd@file"]
    prowlarr-router:
      rule: "Host(`prowlarr.looknet.ca`)"
      entryPoints: ["websecure"]
      service: prowlarr-svc
      middlewares: ["authentik-fwd@file"]

  middlewares:
    ain-cors:
      headers:
        accessControlAllowMethods: ["GET", "OPTIONS", "POST", "PUT", "DELETE"]
        accessControlAllowOriginList: ["https://ain.looknet.ca", "https://dev-ain.looknet.ca"]
        accessControlAllowHeaders: ["*"]
        accessControlMaxAge: 100
        addVaryHeader: true
    guac-redirect:
      redirectRegex:
        regex: "^https://remote.looknet.ca/$"
        replacement: "https://remote.looknet.ca/guacamole"
        permanent: true
    authentik-fwd:
      forwardAuth:
        address: "http://authentik_server:9000/outpost.goauthentik.io/auth/traefik"
        trustForwardHeader: true
        authResponseHeaders: ["X-authentik-username", "X-authentik-groups", "X-authentik-email", "X-authentik-name"]
    authelia-headers-fix:
      headers:
        customRequestHeaders:
          Host: "auth.looknet.ca"
    pterodactyl-https:
      headers:
        customRequestHeaders:
          X-Forwarded-Proto: "https"

  services:
    base-svc:
      loadBalancer:
        servers: [{url: "http://192.168.30.12:7575"}]
    dev-ain-svc:
