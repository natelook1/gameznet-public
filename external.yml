    plex-router:
      rule: "Host(`plex.looknet.ca`)"
      entryPoints: ["websecure"]
      service: plex-svc
    gamez-router:
      rule: "Host(`gamez.looknet.ca`)"
      entryPoints: ["websecure"]
      service: gamez-svc
      middlewares: ["pterodactyl-https"]
    gamenet-router:
      rule: "Host(`gamenet.looknet.ca`)"
      entryPoints: ["websecure"]
      service: gamenet-svc
    homepage-router:
