tls:
  certificates:
    - certFile: "/run/secrets/looknet_ca_cert"
      keyFile: "/run/secrets/looknet_ca_key"

http:
  routers:
    dev-ain-router:
      rule: "Host(`dev-ain.looknet.ca`)"
      entryPoints: ["websecure"]
      service: dev-ain-svc
      middlewares: ["ain-cors"]
    api-ain-router:
      rule: "Host(`api-ain.looknet.ca`)"
      entryPoints: ["websecure"]
      service: api-ain-svc
      middlewares: ["ain-cors"]
    api-stats-router:
      rule: "Host(`api-stats.looknet.ca`)"
      entryPoints: ["websecure"]
      service: api-stats-svc
      middlewares: ["ain-cors"]
    nateflix-router:
