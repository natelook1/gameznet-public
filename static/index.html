<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <title>GamezNET</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="apple-touch-icon" href="/favicon.svg">
  <link rel="manifest" href="/manifest.json">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f0f13;
      --surface: #1a1a21;
      --surface2: #22222c;
      --border: #2e2e3a;
      --accent: #7c6af7;
      --accent-dim: #3a3470;
      --green: #22c55e;
      --red: #ef4444;
      --text: #e2e2e8;
      --muted: #6b6b7a;
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; overflow: hidden; -webkit-font-smoothing: antialiased; }
    #root { height: 100%; display: flex; flex-direction: column; }

    /* ── Token screen ── */
    .token-screen { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px 24px; gap: 20px; }
    .logo { font-size: 30px; font-weight: 800; letter-spacing: -1px; }
    .logo span { color: var(--accent); }
    .subtitle { color: var(--muted); font-size: 14px; text-align: center; line-height: 1.5; }
    .token-form { width: 100%; max-width: 320px; display: flex; flex-direction: column; gap: 12px; }
    .token-input { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; color: var(--text); font-size: 15px; font-family: monospace; letter-spacing: 2px; outline: none; width: 100%; }
    .token-input:focus { border-color: var(--accent); }
    .token-input::placeholder { font-family: -apple-system, sans-serif; letter-spacing: 0; color: var(--muted); }
    .btn { background: var(--accent); border: none; border-radius: 10px; padding: 14px; color: #fff; font-size: 15px; font-weight: 600; cursor: pointer; width: 100%; transition: opacity 0.15s; }
    .btn:disabled { opacity: 0.45; cursor: default; }
    .btn:active:not(:disabled) { opacity: 0.8; }
    .error { color: var(--red); font-size: 13px; text-align: center; }
    .btn-outline { background: transparent; border: 1px solid var(--border); border-radius: 10px; padding: 12px; color: var(--muted); font-size: 14px; font-weight: 500; cursor: pointer; width: 100%; transition: border-color 0.15s, color 0.15s; }
    .btn-outline:hover { border-color: var(--accent); color: var(--text); }

    /* ── QR Scanner ── */
    .qr-scanner-wrap { position: fixed; inset: 0; background: #000; z-index: 100; display: flex; flex-direction: column; }
    .qr-video { flex: 1; width: 100%; object-fit: cover; }
    .qr-overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; }
    .qr-frame { width: 220px; height: 220px; border: 2px solid var(--accent); border-radius: 12px; box-shadow: 0 0 0 9999px rgba(0,0,0,0.55); }
    .qr-hint { color: #fff; font-size: 13px; margin-top: 20px; opacity: 0.8; }
    .qr-cancel { pointer-events: all; position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3); border-radius: 10px; padding: 12px 32px; color: #fff; font-size: 15px; cursor: pointer; }

    /* ── Layout ── */
    .app { display: flex; flex-direction: column; height: 100%; }
    .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 10px 16px; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .header-logo { font-size: 15px; font-weight: 800; flex: 1; }
    .header-logo span { color: var(--accent); }
    .avatar { width: 30px; height: 30px; border-radius: 50%; object-fit: cover; }
    .avatar-placeholder { width: 30px; height: 30px; border-radius: 50%; background: var(--accent-dim); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: #fff; flex-shrink: 0; }
    .header-name { font-size: 13px; font-weight: 500; color: var(--muted); }
    .tab-content { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
    .tabbar { background: var(--surface); border-top: 1px solid var(--border); display: flex; flex-shrink: 0; padding-bottom: env(safe-area-inset-bottom, 0px); }
    .tab { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 9px 4px; gap: 3px; cursor: pointer; border: none; background: none; color: var(--muted); font-size: 10px; font-weight: 500; position: relative; transition: color 0.15s; }
    .tab.active { color: var(--accent); }
    .tab-icon { font-size: 19px; line-height: 1; display: flex; align-items: center; justify-content: center; height: 19px; }
    .tab .wow-tab-logo { height: 18px; opacity: 0.5; filter: grayscale(1); transition: all 0.15s; }
    .tab.active .wow-tab-logo { opacity: 1; filter: grayscale(0); }
    .badge { position: absolute; top: 5px; right: calc(50% - 18px); background: var(--red); color: #fff; font-size: 9px; font-weight: 700; border-radius: 99px; padding: 1px 4px; min-width: 15px; text-align: center; }

    /* ── Shared ── */
    .scroll { flex: 1; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px; margin: 10px 12px; }
    .card-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted); margin-bottom: 10px; }
    .loading { display: flex; align-items: center; justify-content: center; padding: 48px 24px; color: var(--muted); font-size: 14px; }
    .empty { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 48px 24px; gap: 10px; color: var(--muted); font-size: 14px; text-align: center; }
    .empty-icon { font-size: 32px; }
    .back-bar { display: flex; align-items: center; gap: 6px; padding: 11px 16px; color: var(--accent); font-size: 15px; cursor: pointer; border-bottom: 1px solid var(--border); background: var(--surface); flex-shrink: 0; user-select: none; }

    /* ── Players ── */
    .player-row { display: flex; align-items: center; gap: 10px; padding: 9px 0; border-bottom: 1px solid var(--border); }
    .player-row:last-child { border-bottom: none; }
    .player-av { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; flex-shrink: 0; }
    .player-av-ph { width: 36px; height: 36px; border-radius: 50%; background: var(--accent-dim); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: #fff; flex-shrink: 0; }
    .player-info { flex: 1; min-width: 0; }
    .player-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .player-sub { font-size: 12px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .ping { font-size: 11px; color: var(--green); font-family: monospace; }

    /* ── Servers ── */
    .chips { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .chip { position: relative; overflow: hidden; border-radius: 12px; border: 1px solid var(--border); cursor: pointer; min-height: 100px; display: flex; flex-direction: column; transition: border-color 0.15s; }
    .chip:active { opacity: 0.85; }
    .chip-art { position: absolute; inset: 0; background-size: cover; background-position: center top; }
    .chip-gradient { position: absolute; inset: 0; background: linear-gradient(160deg, rgba(10,10,15,0.55) 0%, rgba(10,10,15,0.97) 70%); }
    .chip-content { position: relative; z-index: 1; padding: 10px 11px; display: flex; flex-direction: column; justify-content: space-between; flex: 1; }
    .chip-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 6px; }
    .chip-name { font-size: 13px; font-weight: 700; line-height: 1.2; text-shadow: 0 1px 4px rgba(0,0,0,0.8); }
    .chip-badge { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; padding: 2px 6px; border-radius: 4px; white-space: nowrap; flex-shrink: 0; }
    .chip-badge-on  { background: rgba(34,197,94,0.2);  color: var(--green);  border: 1px solid rgba(34,197,94,0.3); }
    .chip-badge-off { background: rgba(239,68,68,0.2);  color: var(--red);    border: 1px solid rgba(239,68,68,0.3); }
    .chip-badge-mid { background: rgba(234,179,8,0.2);  color: var(--yellow); border: 1px solid rgba(234,179,8,0.3); }
    .chip-stats { display: flex; gap: 10px; margin-top: 6px; }
    .chip-stat { display: flex; flex-direction: column; gap: 1px; }
    .chip-stat-label { font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); }
    .chip-stat-value { font-size: 11px; font-family: monospace; color: var(--text); }
    .chip-bar { height: 2px; border-radius: 1px; background: rgba(255,255,255,0.1); overflow: hidden; margin-top: 2px; width: 40px; }
    .chip-bar-fill { height: 100%; border-radius: 1px; transition: width 0.3s; }
    .chip-offline { opacity: 0.5; }
    .chip-pulse { animation: pulse-border 2s ease-in-out infinite; }
    @keyframes pulse-border { 0%,100% { border-color: var(--border); } 50% { border-color: var(--yellow); } }
    .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .dot-on { background: var(--green); }
    .dot-off { background: var(--red); }
    .dot-starting { background: var(--yellow); }

    /* ── Session ── */
    .session-card { background: linear-gradient(135deg, var(--accent-dim), #14142a); border-color: var(--accent); }
    .session-game { font-size: 17px; font-weight: 700; margin-bottom: 3px; }
    .session-meta { font-size: 12px; color: var(--muted); margin-bottom: 8px; }
    .session-cd { font-size: 24px; font-weight: 700; font-family: monospace; color: var(--accent); }

    /* ── Chat ── */
    .chat-wrap { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .messages { flex: 1; overflow-y: auto; padding: 10px 14px; display: flex; flex-direction: column; gap: 1px; -webkit-overflow-scrolling: touch; }
    .msg { padding: 3px 0; }
    .msg-head { display: flex; align-items: baseline; gap: 7px; margin-bottom: 1px; }
    .msg-name { font-size: 13px; font-weight: 600; color: var(--accent); }
    .msg-name.me { color: var(--green); }
    .msg-time { font-size: 11px; color: var(--muted); }
    .msg-body { font-size: 14px; line-height: 1.45; word-break: break-word; }
    .input-bar { display: flex; gap: 8px; padding: 9px 12px; background: var(--surface); border-top: 1px solid var(--border); padding-bottom: calc(9px + env(safe-area-inset-bottom, 0px)); flex-shrink: 0; }
    .msg-input { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 9px 14px; color: var(--text); font-size: 14px; outline: none; }
    .msg-input:focus { border-color: var(--accent); }
    .send-btn { background: var(--accent); border: none; border-radius: 50%; width: 38px; height: 38px; color: #fff; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .send-btn:disabled { opacity: 0.4; }
    .send-btn:active:not(:disabled) { opacity: 0.8; }

    /* ── Discord channels ── */
    .cat-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted); padding: 14px 16px 4px; }
    .ch-row { display: flex; align-items: center; gap: 8px; padding: 9px 16px; cursor: pointer; }
    .ch-row:active { background: var(--surface2); }
    .ch-hash { color: var(--muted); font-size: 16px; font-weight: 500; }
    .ch-name { font-size: 14px; color: var(--muted); }

    /* ── DMs ── */
    .dm-row { display: flex; align-items: center; gap: 10px; padding: 12px 16px; cursor: pointer; border-bottom: 1px solid var(--border); }
    .dm-row:active { background: var(--surface2); }
    .dm-unread { margin-left: auto; background: var(--accent); color: #fff; font-size: 10px; font-weight: 700; border-radius: 99px; padding: 2px 7px; flex-shrink: 0; }

    /* ── Bottom sheet ── */
    .sheet-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; display: flex; align-items: flex-end; animation: fade-in 0.15s ease; }
    .sheet { background: var(--surface); border-radius: 18px 18px 0 0; width: 100%; padding: 0 0 calc(24px + env(safe-area-inset-bottom,0px)); max-height: 85vh; overflow-y: auto; animation: slide-up 0.22s cubic-bezier(0.32,0.72,0,1); }
    .sheet-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 12px auto 0; }
    .sheet-header { padding: 16px 20px 12px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
    .sheet-title { font-size: 17px; font-weight: 700; flex: 1; }
    .sheet-state { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; padding: 3px 8px; border-radius: 6px; }
    .sheet-state-on  { background: rgba(34,197,94,0.15);  color: var(--green); }
    .sheet-state-off { background: rgba(239,68,68,0.15);  color: var(--red); }
    .sheet-state-starting { background: rgba(234,179,8,0.15); color: var(--yellow); }
    .sheet-state-stopping { background: rgba(234,179,8,0.15); color: var(--yellow); }
    .sheet-art { width: 100%; height: 120px; object-fit: cover; object-position: center top; border-radius: 18px 18px 0 0; display: block; }
    .sheet-body { padding: 16px 20px; display: flex; flex-direction: column; gap: 16px; }
    .sheet-stat-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .sheet-stat { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 12px; }
    .sheet-stat-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted); margin-bottom: 4px; }
    .sheet-stat-value { font-size: 20px; font-weight: 700; font-family: monospace; margin-bottom: 8px; }
    .sheet-bar { height: 4px; border-radius: 2px; background: var(--border); overflow: hidden; }
    .sheet-bar-fill { height: 100%; border-radius: 2px; transition: width 0.4s; }
    .sheet-actions { display: flex; flex-direction: column; gap: 8px; }
    .sheet-btn { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 13px; border-radius: 10px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; width: 100%; transition: opacity 0.15s; }
    .sheet-btn:active { opacity: 0.75; }
    .sheet-btn-primary { background: var(--accent); color: #fff; }
    .sheet-btn-secondary { background: var(--surface2); border: 1px solid var(--border); color: var(--text); }
    .sheet-btn-ptero { background: rgba(124,106,247,0.12); border: 1px solid var(--accent); color: var(--accent); }
    .copied { color: var(--green) !important; }
    @keyframes fade-in  { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slide-up { from { transform: translateY(100%); } to { transform: translateY(0); } }

    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="module">
  import { h, render } from 'https://esm.sh/preact@10';
  import { useState, useEffect, useRef } from 'https://esm.sh/preact@10/hooks';
  import htm from 'https://esm.sh/htm@3';
  import { WowTab } from '/wow.js?v=1.2.8';
  const html = htm.bind(h);

  const API = 'https://gameznet.looknet.ca';

  function req(path, opts = {}) {
    const token = localStorage.getItem('gzn_token');
    const session = localStorage.getItem('gzn_session');
    return fetch(API + path, {
      ...opts,
      headers: {
        'Content-Type': 'application/json',
        ...(token ? { 'X-Token': token } : {}),
        ...(session ? { 'X-Session': session } : {}),
        ...(opts.headers || {})
      }
    });
  }

  function fmtTime(iso) {
    return new Date(iso).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  function countdown(iso) {
    const diff = new Date(iso) - Date.now();
    if (diff <= 0) return 'Starting now';
    const h = Math.floor(diff / 3600000), m = Math.floor((diff % 3600000) / 60000), s = Math.floor((diff % 60000) / 1000);
    if (h > 0) return `${h}h ${m}m`;
    if (m > 0) return `${m}m ${s}s`;
    return `${s}s`;
  }

  function parsePing(ping) {
    if (!ping) return null;
    try {
      const arr = typeof ping === 'string' ? JSON.parse(ping) : ping;
      if (Array.isArray(arr)) {
        const valid = arr.filter(v => v > 0);
        return valid.length ? Math.round(valid.reduce((a, b) => a + b, 0) / valid.length) : null;
      }
      return parseInt(ping) > 0 ? parseInt(ping) : null;
    } catch { return null; }
  }

  function initials(name) {
    return (name || '?').split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
  }

  function PlayerAv({ player, size = 36 }) {
    const style = { width: size, height: size, fontSize: size * 0.38 };
    if (player?.steam_avatar) return html`<img class="player-av" src=${player.steam_avatar} style=${style} alt="" />`;
    return html`<div class="player-av-ph" style=${style}>${initials(player?.name || player?.from_name || '?')}</div>`;
  }

  // ── Token Screen ────────────────────────────────────────────────────────────
  function TokenScreen({ onAuth, initialToken = '' }) {
    const [token, setToken] = useState(initialToken);
    const [loading, setLoading] = useState(false);
    const [error, setError] = useState('');
    const [scanning, setScanning] = useState(false);
    const videoRef = useRef(null);
    const streamRef = useRef(null);
    const rafRef = useRef(null);

    async function submit(e) {
      if (e && e.preventDefault) e.preventDefault();
      const t = token.trim();
      if (!t) return;
      setLoading(true); setError('');
      try {
        const res = await fetch(`${API}/api/mobile/whoami`, { headers: { 'X-Token': t } });
        if (res.status === 409) { setError('This token is already active on another device. Revoke it from the PC app first.'); return; }
        if (!res.ok) { setError('Invalid token.'); return; }
        const data = await res.json();
        localStorage.setItem('gzn_token', t);
        localStorage.setItem('gzn_session', data.session);
        onAuth(data);
      } catch { setError('Could not reach server.'); }
      finally { setLoading(false); }
    }

    async function startScan() {
      if (!('BarcodeDetector' in window)) {
        setError('QR scanning not supported in this browser. Try Chrome or Safari 15.4+.');
        return;
      }
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment' }
        });
        streamRef.current = stream;
        setScanning(true);
        // Attach stream after render
        setTimeout(() => {
          if (videoRef.current) {
            videoRef.current.srcObject = stream;
            videoRef.current.play();
          }
          scanLoop();
        }, 100);
      } catch {
        setError('Camera access denied. Allow camera permission and try again.');
      }
    }

    function stopScan() {
      cancelAnimationFrame(rafRef.current);
      if (streamRef.current) {
        streamRef.current.getTracks().forEach(t => t.stop());
        streamRef.current = null;
      }
      setScanning(false);
    }

    async function scanLoop() {
      const detector = new BarcodeDetector({ formats: ['qr_code'] });
      async function tick() {
        if (!videoRef.current || videoRef.current.readyState < 2) {
          rafRef.current = requestAnimationFrame(tick);
          return;
        }
        try {
          const codes = await detector.detect(videoRef.current);
          if (codes.length > 0) {
            const raw = codes[0].rawValue;
            // Accept bare token or URL with ?token= param
            let found = raw.trim();
            try {
              const u = new URL(raw);
              const p = u.searchParams.get('token');
              if (p) found = p;
            } catch {}
            stopScan();
            setToken(found);
            // Auto-submit after state settles
            setTimeout(async () => {
              setLoading(true); setError('');
              try {
                const res = await fetch(`${API}/api/mobile/whoami`, { headers: { 'X-Token': found } });
                if (res.status === 409) { setError('This token is already active on another device. Revoke it from the PC app first.'); return; }
                if (!res.ok) { setError('Invalid token.'); return; }
                const data = await res.json();
                localStorage.setItem('gzn_token', found);
                localStorage.setItem('gzn_session', data.session);
                onAuth(data);
              } catch { setError('Could not reach server.'); }
              finally { setLoading(false); }
            }, 50);
            return;
          }
        } catch {}
        rafRef.current = requestAnimationFrame(tick);
      }
      rafRef.current = requestAnimationFrame(tick);
    }

    if (scanning) return html`
      <div class="qr-scanner-wrap">
        <video ref=${videoRef} class="qr-video" muted playsinline></video>
        <div class="qr-overlay">
          <div class="qr-frame"></div>
          <div class="qr-hint">Point at the QR code on your PC</div>
        </div>
        <button class="qr-cancel" onClick=${stopScan}>Cancel</button>
      </div>
    `;

    return html`
      <div class="token-screen">
        <div class="logo">Gamez<span>NET</span></div>
        <p class="subtitle">Enter your invite token to access the network.</p>
        <form class="token-form" onSubmit=${submit}>
          <input class="token-input" type="text" placeholder="XXXX-XXXX-XXXX-XXXX"
            value=${token} onInput=${e => setToken(e.target.value)}
            autocomplete="off" autocapitalize="none" spellcheck="false" />
          ${error && html`<p class="error">${error}</p>`}
          <button class="btn" type="submit" disabled=${loading || !token.trim()}>
            ${loading ? 'Verifying…' : 'Connect'}
          </button>
          <button class="btn-outline" type="button" onClick=${startScan}>
            📷 Scan QR Code
          </button>
        </form>
      </div>
    `;
  }

  // ── Home Tab ────────────────────────────────────────────────────────────────
  function HomeTab({ me }) {
    const [online, setOnline] = useState([]);
    const [servers, setServers] = useState([]);
    const [session, setSession] = useState(null);
    const [tick, setTick] = useState(0);
    const [selectedServerId, setSelectedServerId] = useState(null);
    const selectedServer = selectedServerId ? servers.find(s => (s.id || s.name) === selectedServerId) || null : null;

    useEffect(() => {
      async function load() {
        try {
          const [oR, sR, sessR] = await Promise.all([req('/api/online'), req('/api/servers'), req('/api/session')]);
          if (oR.ok) setOnline(await oR.json());
          if (sR.ok) setServers(await sR.json());
          if (sessR.ok) { const d = await sessR.json(); setSession(d.session || null); }
        } catch {}
      }
      load();
      const iv = setInterval(load, 15000);
      return () => clearInterval(iv);
    }, []);

    useEffect(() => {
      if (!session) return;
      const iv = setInterval(() => setTick(t => t + 1), 1000);
      return () => clearInterval(iv);
    }, [session]);

    return html`
      <div class="scroll">

        <div class="card">
          <div class="card-label">Who's Online · ${online.length}</div>
          ${online.length === 0
            ? html`<div class="empty" style="padding:16px 0;"><span class="empty-icon">🎮</span><span>No one online yet</span></div>`
            : online.map(p => html`
              <div class="player-row" key=${p.name}>
                <${PlayerAv} player=${p} />
                <div class="player-info">
                  <div class="player-name">${p.name}${p.name === me.name ? ' (you)' : ''}</div>
                  <div class="player-sub">${p.mobile ? 'Mobile' : (p.game || p.status || 'Online')}</div>
                </div>
                ${parsePing(p.ping) !== null && html`<div class="ping">${parsePing(p.ping)}ms</div>`}
              </div>
            `)
          }
        </div>

        ${session && html`
          <div class="card session-card">
            <div class="card-label">Scheduled Session</div>
            <div class="session-game">${session.game}</div>
            <div class="session-meta">
              Hosted by ${session.host} · ${new Date(session.scheduled_at).toLocaleString([], { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' })}
            </div>
            ${session.message && html`<div style="font-size:13px;color:var(--muted);margin-bottom:8px;">${session.message}</div>`}
            <div class="session-cd">${countdown(session.scheduled_at)}</div>
          </div>
        `}

        ${servers.length > 0 && html`
          <div class="card">
            <div class="card-label">Game Servers</div>
            <div class="chips">
              ${servers.map(s => {
                const on = s.state === 'running';
                const inTransit = s.state === 'starting' || s.state === 'stopping';
                const badgeClass = on ? 'chip-badge-on' : inTransit ? 'chip-badge-mid' : 'chip-badge-off';
                const badgeLabel = s.state || 'offline';
                const ram = s.memory_mb >= 1024 ? `${(s.memory_mb / 1024).toFixed(1)} GiB` : `${s.memory_mb} MiB`;
                const uptime = s.uptime > 0 ? (s.uptime >= 3600000 ? `${Math.floor(s.uptime/3600000)}h up` : `${Math.floor(s.uptime/60000)}m up`) : null;
                const isMc = /min.?craft|bedrock|geyser|eaglercraft/i.test(s.name);
                const artUrl = s.steam_appid ? `https://cdn.akamai.steamstatic.com/steam/apps/${s.steam_appid}/header.jpg` : isMc ? '/banner.png' : null;
                const cpuColor = s.cpu > 80 ? 'var(--red)' : s.cpu > 50 ? 'var(--yellow)' : 'var(--green)';
                return html`
                  <div class="chip ${!on && !inTransit ? 'chip-offline' : ''} ${inTransit ? 'chip-pulse' : ''}"
                    key=${s.id || s.name} onClick=${() => setSelectedServerId(s.id || s.name)}>
                    ${artUrl && html`<div class="chip-art" style="background-image:url('${artUrl}');"></div>`}
                    <div class="chip-gradient"></div>
                    <div class="chip-content">
                      <div class="chip-top">
                        <span class="chip-name">${s.name}</span>
                        <span class="chip-badge ${badgeClass}">${badgeLabel}</span>
                      </div>
                      ${on ? html`
                        <div class="chip-stats">
                          <div class="chip-stat">
                            <span class="chip-stat-label">CPU</span>
                            <span class="chip-stat-value">${s.cpu}%</span>
                            <div class="chip-bar"><div class="chip-bar-fill" style="width:${Math.min(s.cpu,100)}%;background:${cpuColor};"></div></div>
                          </div>
                          <div class="chip-stat">
                            <span class="chip-stat-label">RAM</span>
                            <span class="chip-stat-value">${ram}</span>
                            <div class="chip-bar"><div class="chip-bar-fill" style="width:${s.memory_limit_mb > 0 ? Math.min(100, Math.round(s.memory_mb / s.memory_limit_mb * 100)) : 100}%;background:var(--accent);opacity:0.7;"></div></div>
                          </div>
                          ${uptime && html`<div class="chip-stat"><span class="chip-stat-label">Up</span><span class="chip-stat-value">${uptime.replace(' up','')}</span></div>`}
                        </div>
                      ` : inTransit ? html`
                        <div style="font-size:10px;color:var(--yellow);font-family:monospace;">● ${s.state === 'stopping' ? 'Shutting down…' : 'Starting up…'}</div>
                      ` : null}
                    </div>
                  </div>
                `;
              })}
            </div>
          </div>
        `}

      </div>
      ${selectedServer && html`<${ServerSheet} server=${selectedServer} onClose=${() => setSelectedServerId(null)} />`}
    `;
  }

  // ── Server Sheet ────────────────────────────────────────────────────────────
  function ServerSheet({ server: s, onClose }) {
    const [copied, setCopied] = useState(false);
    const on = s.state === 'running';
    const inTransit = s.state === 'starting' || s.state === 'stopping';
    const stateClass = on ? 'sheet-state-on' : inTransit ? 'sheet-state-stopping' : 'sheet-state-off';
    const artUrl = s.steam_appid ? `https://cdn.akamai.steamstatic.com/steam/apps/${s.steam_appid}/header.jpg` : null;
    const ram = s.memory_mb >= 1024 ? `${(s.memory_mb / 1024).toFixed(1)} GiB` : `${s.memory_mb} MiB`;
    const uptime = s.uptime > 0
      ? (s.uptime >= 3600000 ? `${Math.floor(s.uptime/3600000)}h ${Math.floor((s.uptime%3600000)/60000)}m` : `${Math.floor(s.uptime/60000)}m`)
      : '—';
    const cpuColor = s.cpu > 80 ? 'var(--red)' : s.cpu > 50 ? 'var(--yellow)' : 'var(--green)';

    const isEagler = /eaglercraft|ealgercraft/i.test(s.name);

    function copyPort() {
      navigator.clipboard.writeText(String(s.port || ''));
      setCopied(true);
      setTimeout(() => setCopied(false), 1500);
    }

    return html`
      <div class="sheet-backdrop" onClick=${e => e.target === e.currentTarget && onClose()}>
        <div class="sheet">
          ${artUrl
            ? html`<img class="sheet-art" src=${artUrl} alt=${s.name} />`
            : html`<div class="sheet-handle"></div>`
          }
          <div class="sheet-header" style=${artUrl ? 'padding-top:12px;' : ''}>
            <span class="sheet-title">${s.name}</span>
            <span class="sheet-state ${stateClass}">${s.state || 'offline'}</span>
          </div>
          <div class="sheet-body">
            ${(on || inTransit) && html`
              <div class="sheet-stat-row">
                <div class="sheet-stat">
                  <div class="sheet-stat-label">CPU</div>
                  <div class="sheet-stat-value">${s.cpu}%</div>
                  <div class="sheet-bar"><div class="sheet-bar-fill" style="width:${Math.min(s.cpu,100)}%;background:${cpuColor};"></div></div>
                </div>
                <div class="sheet-stat">
                  <div class="sheet-stat-label">RAM</div>
                  <div class="sheet-stat-value">${ram}</div>
                  <div class="sheet-bar"><div class="sheet-bar-fill" style="width:${s.memory_limit_mb > 0 ? Math.min(100, Math.round(s.memory_mb / s.memory_limit_mb * 100)) : 100}%;background:var(--accent);opacity:0.5;"></div></div>
                </div>
                <div class="sheet-stat">
                  <div class="sheet-stat-label">Uptime</div>
                  <div class="sheet-stat-value" style="font-size:16px;">${uptime}</div>
                </div>
                ${s.port && html`
                  <div class="sheet-stat">
                    <div class="sheet-stat-label">Port</div>
                    <div class="sheet-stat-value" style="font-size:16px;">${s.port}</div>
                  </div>
                `}
              </div>
            `}
            <div class="sheet-actions">
              ${s.port && html`
                <button class="sheet-btn sheet-btn-secondary" onClick=${copyPort}>
                  ${copied ? '✓ Copied' : `Copy Port — ${s.port}`}
                </button>
              `}
              ${s.steam_appid && s.host && html`
                <a class="sheet-btn sheet-btn-secondary" href="steam://connect/${s.host}:${s.port}" style="text-decoration:none;">
                  ▶ Steam Join
                </a>
              `}
              ${isEagler ? html`
                <a class="sheet-btn sheet-btn-secondary" href="https://gameznet.looknet.ca/public/eaglercraft.html" target="_blank" rel="noopener" style="text-decoration:none;">
                  🌐 Play in Browser
                </a>
              ` : html`
                <a class="sheet-btn sheet-btn-ptero" href="https://gamez.looknet.ca/server/${s.id}" target="_blank" rel="noopener" style="text-decoration:none;">
                  ⚙ Manage in Pterodactyl
                </a>
              `}
            </div>
          </div>
        </div>
      </div>
    `;
  }

  // ── Chat Tab ────────────────────────────────────────────────────────────────
  function ChatTab({ me }) {
    const [messages, setMessages] = useState([]);
    const [input, setInput] = useState('');
    const [sending, setSending] = useState(false);
    const bottomRef = useRef(null);
    const msgsRef = useRef(null);
    const lastSince = useRef(new Date(0).toISOString());
    const atBottom = useRef(true);

    useEffect(() => {
      async function init() {
        try {
          const res = await req('/api/chat');
          if (!res.ok) return;
          const msgs = await res.json();
          setMessages(msgs);
          if (msgs.length) lastSince.current = msgs[msgs.length - 1].sent_at;
          setTimeout(() => bottomRef.current?.scrollIntoView(), 80);
        } catch {}
      }
      init();
      const iv = setInterval(async () => {
        try {
          const res = await req(`/api/chat?since=${encodeURIComponent(lastSince.current)}`);
          if (!res.ok) return;
          const fresh = await res.json();
          if (!fresh.length) return;
          lastSince.current = fresh[fresh.length - 1].sent_at;
          setMessages(prev => {
            const ids = new Set(prev.map(m => m.id));
            return [...prev, ...fresh.filter(m => !ids.has(m.id))].slice(-300);
          });
        } catch {}
      }, 3000);
      return () => clearInterval(iv);
    }, []);

    useEffect(() => { if (atBottom.current) bottomRef.current?.scrollIntoView(); }, [messages]);

    async function send(e) {
      e.preventDefault();
      const body = input.trim();
      if (!body || sending) return;
      setSending(true); setInput('');
      try { await req('/api/chat/send', { method: 'POST', body: JSON.stringify({ name: me.name, body }) }); }
      catch {} finally { setSending(false); }
    }

    return html`
      <div class="chat-wrap">
        <div class="messages" ref=${msgsRef} onScroll=${() => {
          const el = msgsRef.current;
          atBottom.current = el ? el.scrollHeight - el.scrollTop - el.clientHeight < 60 : true;
        }}>
          ${messages.length === 0 && html`<div class="loading">Loading…</div>`}
          ${messages.map((m, i) => {
            const isMe = m.from_name === me.name;
            const showHead = i === 0 || messages[i - 1].from_name !== m.from_name;
            return html`
              <div class="msg" key=${m.id}>
                ${showHead && html`
                  <div class="msg-head">
                    <span class="msg-name ${isMe ? 'me' : ''}">${m.from_name}</span>
                    <span class="msg-time">${fmtTime(m.sent_at)}</span>
                  </div>
                `}
                <div class="msg-body">${m.body}</div>
              </div>
            `;
          })}
          <div ref=${bottomRef} />
        </div>
        <form class="input-bar" onSubmit=${send}>
          <input class="msg-input" placeholder="Message…" value=${input} onInput=${e => setInput(e.target.value)} />
          <button type="submit" class="send-btn" disabled=${!input.trim() || sending}>➤</button>
        </form>
      </div>
    `;
  }

  // ── Discord Tab ─────────────────────────────────────────────────────────────
  function DiscordTab({ me }) {
    const [channels, setChannels] = useState([]); // flat list of { catName, id, name }
    const [active, setActive] = useState(null);
    const [messages, setMessages] = useState([]);
    const [input, setInput] = useState('');
    const [loading, setLoading] = useState(true);
    const [loadingMsgs, setLoadingMsgs] = useState(false);
    const bottomRef = useRef(null);
    const pollRef = useRef(null);

    useEffect(() => {
      req('/api/discord/channels').then(r => r.ok ? r.json() : null).then(d => {
        if (!d) { setLoading(false); return; }
        // Flatten categories + uncategorized into a list of { catName, id, name }
        const flat = [];
        const cats = d.categories || [];
        if (d.uncategorized?.text_channels?.length) cats.push({ name: null, text_channels: d.uncategorized.text_channels });
        for (const cat of cats) {
          for (const ch of (cat.text_channels || [])) flat.push({ catName: cat.name, id: ch.id, name: ch.name });
        }
        setChannels(flat);
        setLoading(false);
      }).catch(() => setLoading(false));
    }, []);

    async function loadMsgs(id) {
      try { const r = await req(`/api/discord/messages?channel=${id}`); if (r.ok) setMessages(await r.json()); } catch {}
    }

    async function openChannel(ch) {
      if (pollRef.current) clearInterval(pollRef.current);
      setActive(ch); setMessages([]); setLoadingMsgs(true);
      await loadMsgs(ch.id);
      setLoadingMsgs(false);
      setTimeout(() => bottomRef.current?.scrollIntoView(), 80);
      pollRef.current = setInterval(() => loadMsgs(ch.id), 8000);
    }

    function closeChannel() {
      if (pollRef.current) clearInterval(pollRef.current);
      setActive(null);
    }

    useEffect(() => () => { if (pollRef.current) clearInterval(pollRef.current); }, []);

    async function send(e) {
      e.preventDefault();
      const content = input.trim();
      if (!content || !active) return;
      setInput('');
      try {
        await req('/api/discord/send', { method: 'POST', body: JSON.stringify({ channel: active.id, content, name: me.name, avatar_url: me.steam_avatar || undefined }) });
        await loadMsgs(active.id);
        setTimeout(() => bottomRef.current?.scrollIntoView(), 50);
      } catch {}
    }

    if (loading) return html`<div class="loading">Loading channels…</div>`;

    if (!active) return html`
      <div class="scroll">
        ${channels.map((ch, i) => {
          const showCat = ch.catName && (i === 0 || channels[i - 1].catName !== ch.catName);
          return html`
            <div key=${ch.id}>
              ${showCat && html`<div class="cat-label">${ch.catName}</div>`}
              <div class="ch-row" onClick=${() => openChannel(ch)}>
                <span class="ch-hash">#</span>
                <span class="ch-name">${ch.name}</span>
              </div>
            </div>
          `;
        })}
      </div>
    `;

    return html`
      <div class="chat-wrap">
        <div class="back-bar" onClick=${closeChannel}>‹# ${active.name}</div>
        <div class="messages">
          ${loadingMsgs && html`<div class="loading">Loading…</div>`}
          ${messages.map((m, i) => {
            const author = m.author?.global_name || m.author?.username || 'Unknown';
            const isMe = author === me.name || m.author?.username === me.name;
            const showHead = i === 0 || messages[i - 1].author?.id !== m.author?.id;
            return html`
              <div class="msg" key=${m.id}>
                ${showHead && html`
                  <div class="msg-head">
                    <span class="msg-name ${isMe ? 'me' : ''}">${author}</span>
                    <span class="msg-time">${fmtTime(m.timestamp)}</span>
                  </div>
                `}
                <div class="msg-body">${m.content}</div>
              </div>
            `;
          })}
          <div ref=${bottomRef} />
        </div>
        <form class="input-bar" onSubmit=${send}>
          <input class="msg-input" placeholder="Message #${active.name}…" value=${input} onInput=${e => setInput(e.target.value)} />
          <button type="submit" class="send-btn" disabled=${!input.trim()}>➤</button>
        </form>
      </div>
    `;
  }

  // ── DMs Tab ─────────────────────────────────────────────────────────────────
  function DMsTab({ me, onUnreadChange }) {
    const [online, setOnline] = useState([]);
    const [unread, setUnread] = useState({});
    const [active, setActive] = useState(null);
    const [messages, setMessages] = useState([]);
    const [input, setInput] = useState('');
    const bottomRef = useRef(null);
    const pollRef = useRef(null);

    async function loadUnread() {
      try {
        const r = await req(`/api/chat/dm/unread?name=${encodeURIComponent(me.name)}`);
        if (r.ok) {
          const u = await r.json();
          const map = Object.fromEntries(u.map(r => [r.from_name, r.count]));
          setUnread(map);
          onUnreadChange(Object.values(map).reduce((a, b) => a + b, 0));
        }
      } catch {}
    }

    useEffect(() => {
      async function load() {
        try { const r = await req('/api/online'); if (r.ok) setOnline(await r.json()); } catch {}
        await loadUnread();
      }
      load();
      const iv = setInterval(load, 10000);
      return () => clearInterval(iv);
    }, [me.name]);

    async function loadHistory(name) {
      try {
        const r = await req(`/api/chat/dm/history?user1=${encodeURIComponent(me.name)}&user2=${encodeURIComponent(name)}`);
        if (r.ok) setMessages(await r.json());
      } catch {}
    }

    async function openConvo(player) {
      if (pollRef.current) clearInterval(pollRef.current);
      setActive(player); setMessages([]);
      await loadHistory(player.name);
      setTimeout(() => bottomRef.current?.scrollIntoView(), 80);
      await req(`/api/chat/dm/read?user1=${encodeURIComponent(me.name)}&user2=${encodeURIComponent(player.name)}`, { method: 'POST' });
      setUnread(prev => { const n = { ...prev }; delete n[player.name]; return n; });
      onUnreadChange(0);
      pollRef.current = setInterval(() => loadHistory(player.name), 4000);
    }

    function closeConvo() {
      if (pollRef.current) clearInterval(pollRef.current);
      setActive(null);
      loadUnread();
    }

    useEffect(() => () => { if (pollRef.current) clearInterval(pollRef.current); }, []);

    async function send(e) {
      e.preventDefault();
      const body = input.trim();
      if (!body || !active) return;
      setInput('');
      try {
        await req('/api/chat/dm/send', { method: 'POST', body: JSON.stringify({ from_name: me.name, to_name: active.name, body }) });
        await loadHistory(active.name);
        setTimeout(() => bottomRef.current?.scrollIntoView(), 50);
      } catch {}
    }

    if (active) return html`
      <div class="chat-wrap">
        <div class="back-bar" onClick=${closeConvo}>‹${active.name}</div>
        <div class="messages">
          ${messages.length === 0 && html`<div class="empty"><span class="empty-icon">💬</span><span>Start the conversation</span></div>`}
          ${messages.map((m, i) => {
            const isMe = m.from_name === me.name;
            const showHead = i === 0 || messages[i - 1].from_name !== m.from_name;
            return html`
              <div class="msg" key=${m.id}>
                ${showHead && html`
                  <div class="msg-head">
                    <span class="msg-name ${isMe ? 'me' : ''}">${m.from_name}</span>
                    <span class="msg-time">${fmtTime(m.sent_at)}</span>
                  </div>
                `}
                <div class="msg-body">${m.body}</div>
              </div>
            `;
          })}
          <div ref=${bottomRef} />
        </div>
        <form class="input-bar" onSubmit=${send}>
          <input class="msg-input" placeholder="Message ${active.name}…" value=${input} onInput=${e => setInput(e.target.value)} />
          <button type="submit" class="send-btn" disabled=${!input.trim()}>➤</button>
        </form>
      </div>
    `;

    const others = online.filter(p => p.name !== me.name);
    return html`
      <div class="scroll">
        ${others.length === 0
          ? html`<div class="empty" style="margin-top:40px;"><span class="empty-icon">👥</span><span>No one else online right now</span></div>`
          : others.map(p => html`
            <div class="dm-row" key=${p.name} onClick=${() => openConvo(p)}>
              <${PlayerAv} player=${p} />
              <div class="player-info">
                <div class="player-name">${p.name}</div>
                <div class="player-sub">${p.game || 'Online'}</div>
              </div>
              ${unread[p.name] && html`<span class="dm-unread">${unread[p.name]}</span>`}
            </div>
          `)
        }
      </div>
    `;
  }

  // ── Main App ────────────────────────────────────────────────────────────────
  function MainApp({ me }) {
    const [tab, setTab] = useState('home');
    const [dmUnread, setDmUnread] = useState(0);

    useEffect(() => {
      async function checkUnread() {
        try {
          const r = await req(`/api/chat/dm/unread?name=${encodeURIComponent(me.name)}`);
          if (r.ok) {
            const u = await r.json();
            setDmUnread(u.reduce((a, b) => a + b.count, 0));
          }
        } catch {}
      }
      checkUnread();
      const iv = setInterval(checkUnread, 10000);
      return () => clearInterval(iv);
    }, [me.name]);

    useEffect(() => {
      async function heartbeat() { try { await req('/api/mobile/heartbeat', { method: 'POST' }); } catch {} }
      heartbeat();
      const iv = setInterval(heartbeat, 15000);
      return () => clearInterval(iv);
    }, [me.name]);

    useEffect(() => {
      if (!('serviceWorker' in navigator) || !('PushManager' in window)) return;
      async function setupPush() {
        try {
          const reg = await navigator.serviceWorker.register('/sw.js');
          const keyRes = await req('/api/mobile/push-key');
          if (!keyRes.ok) return;
          const { publicKey } = await keyRes.json();
          const perm = await Notification.requestPermission();
          if (perm !== 'granted') return;
          const sub = await reg.pushManager.subscribe({
            userVisibleOnly: true,
            applicationServerKey: publicKey
          });
          await req('/api/mobile/subscribe', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ subscription: sub })
          });
        } catch (e) { console.warn('[push] setup failed:', e.message); }
      }
      setupPush();
    }, [me.name]);

    const tabs = [
      { id: 'home',    icon: '🏠', label: 'Home' },
      { id: 'chat',    icon: '💬', label: 'Chat' },
      { id: 'discord', icon: '🎮', label: 'Discord' },
      { id: 'dms',     icon: '✉️',  label: 'DMs', badge: dmUnread || null },
      { id: 'wow',     icon: html`<img src="/static/WoW_icon.svg" class="wow-tab-logo" alt="WoW" />`,  label: 'WoW' },
    ];

    return html`
      <div class="app">
        <div class="header">
          <div class="header-logo">Gamez<span>NET</span></div>
          <${PlayerAv} player=${me} size=${28} />
          <div class="header-name">${me.name}</div>
        </div>
        <div class="tab-content">
          ${tab === 'home'    && html`<${HomeTab}    me=${me} />`}
          ${tab === 'chat'    && html`<${ChatTab}    me=${me} />`}
          ${tab === 'discord' && html`<${DiscordTab} me=${me} />`}
          ${tab === 'dms'     && html`<${DMsTab}     me=${me} onUnreadChange=${setDmUnread} />`}
          ${tab === 'wow'     && html`<${WowTab}     me=${me} />`}
        </div>
        <nav class="tabbar">
          ${tabs.map(t => html`
            <button class="tab ${tab === t.id ? 'active' : ''}" key=${t.id} onClick=${() => setTab(t.id)}>
              ${t.badge && html`<span class="badge">${t.badge}</span>`}
              <span class="tab-icon">${t.icon}</span>
              <span>${t.label}</span>
            </button>
          `)}
        </nav>
      </div>
    `;
  }

  // ── App Root ────────────────────────────────────────────────────────────────
  function App() {
    const [me, setMe] = useState(null);
    const [checking, setChecking] = useState(true);
    const [urlToken, setUrlToken] = useState('');

    useEffect(() => {
      const params = new URLSearchParams(window.location.search);
      const qrToken = params.get('token');
      const stored = localStorage.getItem('gzn_token');
      const storedSession = localStorage.getItem('gzn_session');
      const token = stored || qrToken;
      if (qrToken && !stored) {
        setUrlToken(qrToken);
        window.history.replaceState({}, '', window.location.pathname);
      }
      if (!token) { setChecking(false); return; }
      const headers = { 'X-Token': token, ...(storedSession ? { 'X-Session': storedSession } : {}) };
      fetch(`${API}/api/mobile/whoami`, { headers })
        .then(async r => {
          if (r.ok) return r.json();
          // Session was revoked or invalid — clear storage so user hits login screen
          localStorage.removeItem('gzn_token');
          localStorage.removeItem('gzn_session');
          return null;
        })
        .then(d => { if (d) { localStorage.setItem('gzn_token', token); localStorage.setItem('gzn_session', d.session); setMe(d); } })
        .catch(() => {})
        .finally(() => setChecking(false));
    }, []);

    if (checking) return html`<div class="loading" style="height:100%;font-size:16px;color:var(--accent);">GamezNET</div>`;
    if (!me) return html`<${TokenScreen} onAuth=${setMe} initialToken=${urlToken} />`;
    return html`<${MainApp} me=${me} />`;
  }

  render(html`<${App} />`, document.getElementById('root'));
</script>
</body>
</html>
